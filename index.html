<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本格アクションゲーム</title>
<style>
  body {
    text-align: center;
    background: #111;
    color: white;
  }
  canvas {
    background: #eef;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>本格アクションゲーム</h1>
<p>スペースでジャンプ（2段ジャンプOK）</p>
<p>スコア: <span id="score">0</span> | ライフ: <span id="life">3</span></p>

<canvas id="game" width="600" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 240,
  w: 30,
  h: 30,
  dy: 0,
  jumpCount: 0
};

let gravity = 0.7;
let speed = 5;
let score = 0;
let life = 3;
let gameOver = false;

let enemies = [];
let coins = [];

// ジャンプ（2段）
document.addEventListener("keydown", e => {
  if (e.code === "Space" && player.jumpCount < 2) {
    player.dy = -12;
    player.jumpCount++;
  }
});

// 敵生成
function addEnemy() {
  enemies.push({
    x: 600,
    y: 250,
    w: 30,
    h: 30
  });
}

// コイン生成
function addCoin() {
  coins.push({
    x: 600,
    y: Math.random() * 200 + 50,
    size: 15
  });
}

// 当たり判定
function hit(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, 600, 300);

  // プレイヤー
  player.y += player.dy;
  player.dy += gravity;

  if (player.y >= 240) {
    player.y = 240;
    player.dy = 0;
    player.jumpCount = 0;
  }

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // 敵
  ctx.fillStyle = "red";
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.x -= speed;
    ctx.fillRect(e.x, e.y, e.w, e.h);

    if (hit(player, e)) {
      enemies.splice(i, 1);
      life--;
      document.getElementById("life").textContent = life;

      if (life <= 0) {
        gameOver = true;
        alert("ゲームオーバー！スコア: " + score);
      }
    }
  }

  // コイン
  ctx.fillStyle = "gold";
  for (let i = coins.length - 1; i >= 0; i--) {
    let c = coins[i];
    c.x -= speed;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fill();

    if (
      player.x < c.x + c.size &&
      player.x + player.w > c.x - c.size &&
      player.y < c.y + c.size &&
      player.y + player.h > c.y - c.size
    ) {
      coins.splice(i, 1);
      score += 50;
    }
  }

  // スコア
  score++;
  document.getElementById("score").textContent = score;

  // 難易度アップ
  if (score % 300 === 0) {
    speed += 1;
  }

  requestAnimationFrame(update);
}

// 出現タイミング
setInterval(addEnemy, 1200);
setInterval(addCoin, 1500);

update();
</script>

</body>
</html>
