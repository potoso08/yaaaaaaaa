<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ジャンプゲーム</title>
<style>
  body {
    text-align: center;
    background: #111;
    color: white;
  }
  canvas {
    background: #eee;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>ジャンプ回避ゲーム</h1>
<p>スペースキーでジャンプ！障害物をよけろ！</p>
<p>スコア: <span id="score">0</span></p>

<canvas id="game" width="500" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 250,
  width: 30,
  height: 30,
  dy: 0,
  jumping: false
};

let gravity = 0.8;
let obstacles = [];
let speed = 5;
let score = 0;
let gameOver = false;

// ジャンプ
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !player.jumping) {
    player.dy = -12;
    player.jumping = true;
  }
});

// 障害物生成
function addObstacle() {
  obstacles.push({
    x: 500,
    y: 260,
    width: 20,
    height: 40
  });
}

// 衝突判定
function hit(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, 500, 300);

  // プレイヤー
  player.y += player.dy;
  player.dy += gravity;

  if (player.y >= 250) {
    player.y = 250;
    player.dy = 0;
    player.jumping = false;
  }

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // 障害物
  ctx.fillStyle = "red";
  for (let i = 0; i < obstacles.length; i++) {
    let ob = obstacles[i];
    ob.x -= speed;
    ctx.fillRect(ob.x, ob.y, ob.width, ob.height);

    if (hit(player, ob)) {
      gameOver = true;
      alert("ゲームオーバー！スコア: " + score);
    }
  }

  // スコア
  score++;
  document.getElementById("score").textContent = score;

  // スピードアップ（鬼化）
  if (score % 200 === 0) {
    speed += 1;
  }

  requestAnimationFrame(update);
}

// 障害物出現
setInterval(addObstacle, 1200);

update();
</script>

</body>
</html>
